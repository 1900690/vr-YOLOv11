<!doctype html>
<html lang="en">
  <head>
    <title>YOLOv11 XR Object Detection | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/",
          "onnxruntime-web": "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.esm.min.js"
        }
      }
    </script>
  </head>

  <body>
    <script type="module">
import 'xrblocks/addons/simulator/SimulatorAddons.js';
import * as THREE from 'three';
import * as xb from 'xrblocks';
import * as ort from 'onnxruntime-web';

// WebAssemblyのバイナリがCDNから正しく読み込まれるようにパスを設定
ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';

const YOLO_CLASSES = [
  'person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 'boat',
  'traffic light', 'fire hydrant', 'stop sign', 'parking meter', 'bench', 'bird', 'cat',
  'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe', 'backpack',
  'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard', 'sports ball',
  'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard', 'tennis racket',
  'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 'banana', 'apple',
  'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 'donut', 'cake', 'chair',
  'couch', 'potted plant', 'bed', 'dining table', 'toilet', 'tv', 'laptop', 'mouse', 'remote',
  'keyboard', 'cell phone', 'microwave', 'oven', 'toaster', 'sink', 'refrigerator', 'book',
  'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 'toothbrush'
];

/**
 * デバイスのカメラ映像を取得し、YOLOv11 ONNXモデルによる物体検出結果の
 * バウンディングボックスを重ねてXR空間上に表示するアプリです。
 */
class YOLOv11App extends xb.Script {
  constructor() {
    super();
    this.session = null;
    this.isInferencing = false;
    this.firstRun = true;
    this.boxes = [];
    this.displaySize = 640;

    // ONNXモデルに渡すためのオフスクリーンキャンバス
    this.offscreenCanvas = document.createElement('canvas');
    this.offscreenCanvas.width = this.displaySize;
    this.offscreenCanvas.height = this.displaySize;
    this.offCtx = this.offscreenCanvas.getContext('2d', { willReadFrequently: true });

    // ユーザーに表示するテクスチャ用のキャンバス
    this.displayCanvas = document.createElement('canvas');
    this.displayCanvas.width = this.displaySize;
    this.displayCanvas.height = this.displaySize;
    this.displayCtx = this.displayCanvas.getContext('2d');
    
    this.displayTexture = new THREE.CanvasTexture(this.displayCanvas);
    this.displayTexture.colorSpace = THREE.SRGBColorSpace;

    // カメラストリームを取得するための隠しvideo要素
    this.video = document.createElement('video');
    this.video.setAttribute('autoplay', '');
    this.video.setAttribute('muted', '');
    this.video.setAttribute('playsinline', '');
    this.video.style.display = 'none';
    document.body.appendChild(this.video);

    // ガベージコレクションを防ぐため、事前にFloat32Arrayを確保
    this.floatData = new Float32Array(3 * this.displaySize * this.displaySize);
  }

  async init() {
    this.add(new THREE.HemisphereLight(0xffffff, 0x666666, 3));

    // ステータス更新を表示するための空間パネルを作成
    this.panel = new xb.SpatialPanel({
      width: 1.5,
      height: 0.2,
      backgroundColor: '#2b2b2baa',
      useDefaultPosition: false,
    });
    this.panel.position.set(0, 2.05, -1.5);
    this.add(this.panel);

    const grid = this.panel.addGrid();
    this.statusText = grid.addRow().addText({
      text: 'Initializing Camera...',
      fontColor: '#00ff00',
      fontSize: 0.08,
    });

    // カメラ映像とバウンディングボックスを表示するHUDメッシュを作成
    const geometry = new THREE.PlaneGeometry(1.5, 1.5);
    const material = new THREE.MeshBasicMaterial({ 
        map: this.displayTexture, 
        side: THREE.DoubleSide 
    });
    this.displayMesh = new THREE.Mesh(geometry, material);
    this.displayMesh.position.set(0, 1.2, -1.5);
    this.add(this.displayMesh);

    // XR Blocksのカメラストリームをvideo要素に接続
    this.cameraStream = xb.core.deviceCamera;
    this.cameraStream.addEventListener('statechange', (event) => {
      if (event.state === 'streaming') {
        this.video.srcObject = this.cameraStream.stream;
        this.video.play().catch(e => console.warn('Video play blocked:', e));
      }
    });

    // init() をブロックしないように、モデルのロードは非同期のまま実行だけ開始する
    this.loadModel();
  }

  async loadModel() {
    try {
      this.statusText.setText('Loading YOLOv11 ONNX model...');
      // ユーザーがアップロードしたONNXモデルの読み込み
      this.session = await ort.InferenceSession.create('yolo11n.onnx', { 
        executionProviders: ['wasm'] 
      });
      this.statusText.setText('Model Ready! Waiting for camera...');
    } catch (error) {
      console.error('Model load error:', error);
      this.statusText.setText('Failed to load ONNX model.');
    }
  }

  update() {
    // モデルが読み込まれるまでは推論をスキップ
    if (!this.session) return;

    // videoが十分なフレームデータを読み込んでいるか確認
    if (this.video.readyState >= 2 && this.video.videoWidth > 0 && this.video.videoHeight > 0) {
      // 16:9や4:3の映像を1:1の正方形にクロップするための計算
      const size = Math.min(this.video.videoWidth, this.video.videoHeight);
      const sx = (this.video.videoWidth - size) / 2;
      const sy = (this.video.videoHeight - size) / 2;
      
      // 表示用キャンバスにクロップした映像を描画
      this.displayCtx.clearRect(0, 0, this.displaySize, this.displaySize);
      this.displayCtx.drawImage(
        this.video, 
        sx, sy, size, size, 
        0, 0, this.displaySize, this.displaySize
      );
      
      this.drawBoxes();
      
      // テクスチャの更新をThree.jsに通知
      this.displayTexture.needsUpdate = true;
      
      // 推論をリクエスト
      this.runInference(sx, sy, size);
    }
  }

  drawBoxes() {
    for (const box of this.boxes) {
      // クラスIDに基づいて色を分ける
      const color = `hsl(${(box.classId * 45) % 360}, 100%, 50%)`;
      
      // ボックスを描画
      this.displayCtx.strokeStyle = color;
      this.displayCtx.lineWidth = 4;
      this.displayCtx.strokeRect(box.x1, box.y1, box.x2 - box.x1, box.y2 - box.y1);
      
      // ラベルの背景を描画
      const label = `${YOLO_CLASSES[box.classId]} ${(box.score * 100).toFixed(0)}%`;
      this.displayCtx.font = 'bold 20px Arial';
      this.displayCtx.fillStyle = color;
      
      const textWidth = this.displayCtx.measureText(label).width;
      this.displayCtx.fillRect(box.x1, box.y1 - 25, textWidth + 10, 25);
      
      // ラベルの文字を描画
      this.displayCtx.fillStyle = '#000000';
      this.displayCtx.fillText(label, box.x1 + 5, box.y1 - 5);
    }
  }

  async runInference(sx, sy, size) {
    // 既に推論中の場合やモデルが無い場合はスキップ
    if (this.isInferencing || !this.session) return;
    this.isInferencing = true;
    
    if (this.firstRun) {
        this.statusText.setText('Warming up model (first run is slow)...');
    }

    try {
      // 処理用にオフスクリーンキャンバスへ描画
      this.offCtx.drawImage(this.video, sx, sy, size, size, 0, 0, this.displaySize, this.displaySize);
      const imgData = this.offCtx.getImageData(0, 0, this.displaySize, this.displaySize).data;
      
      // RGBAからRGBに変換し、0-1に正規化、そしてCHWフォーマットに並べ替え
      for (let i = 0; i < this.displaySize * this.displaySize; i++) {
        this.floatData[i] = imgData[i * 4] / 255.0; // R
        this.floatData[this.displaySize * this.displaySize + i] = imgData[i * 4 + 1] / 255.0; // G
        this.floatData[2 * this.displaySize * this.displaySize + i] = imgData[i * 4 + 2] / 255.0; // B
      }
      
      const inputName = this.session.inputNames[0];
      const tensor = new ort.Tensor('float32', this.floatData, [1, 3, this.displaySize, this.displaySize]);
      
      // ONNXセッションの実行
      const results = await this.session.run({ [inputName]: tensor });
      
      const outputName = this.session.outputNames[0];
      this.processOutput(results[outputName].data, results[outputName].dims);

      if (this.firstRun) {
          this.firstRun = false;
          this.statusText.setText('YOLOv11 Detecting...');
      }
    } catch (e) {
      console.error('Inference error:', e);
    } finally {
      this.isInferencing = false;
    }
  }

  processOutput(data, dims) {
    // YOLOv11の出力は通常 [batch, 84, 8400] (バッチ, [cx, cy, w, h, 80クラス], アンカー数)
    const numClasses = 80;
    const numAnchors = dims[2] || 8400;
    
    let boxes = [];
    for (let i = 0; i < numAnchors; i++) {
      let maxScore = 0;
      let classId = -1;
      
      // 最も確率の高いクラスを探す
      for (let c = 0; c < numClasses; c++) {
        const score = data[(4 + c) * numAnchors + i];
        if (score > maxScore) {
          maxScore = score;
          classId = c;
        }
      }
      
      // しきい値（Confidence threshold）によるフィルタリング
      if (maxScore > 0.25) {
        const cx = data[0 * numAnchors + i];
        const cy = data[1 * numAnchors + i];
        const w = data[2 * numAnchors + i];
        const h = data[3 * numAnchors + i];
        
        boxes.push({
          x1: cx - w / 2,
          y1: cy - h / 2,
          x2: cx + w / 2,
          y2: cy + h / 2,
          score: maxScore,
          classId: classId
        });
      }
    }
    
    // NMS (Non-Maximum Suppression)で重複ボックスを削除
    this.boxes = this.nms(boxes, 0.45);
  }

  nms(boxes, iouThreshold) {
    boxes.sort((a, b) => b.score - a.score);
    const result = [];
    
    while (boxes.length > 0) {
      const current = boxes.shift();
      result.push(current);
      
      boxes = boxes.filter(box => {
        const xA = Math.max(current.x1, box.x1);
        const yA = Math.max(current.y1, box.y1);
        const xB = Math.min(current.x2, box.x2);
        const yB = Math.min(current.y2, box.y2);
        
        const interW = Math.max(0, xB - xA);
        const interH = Math.max(0, yB - yA);
        const interArea = interW * interH;
        
        const currentArea = (current.x2 - current.x1) * (current.y2 - current.y1);
        const boxArea = (box.x2 - box.x1) * (box.y2 - box.y1);
        const iou = interArea / (currentArea + boxArea - interArea);
        
        // IoUがしきい値未満のボックスだけを残す
        return iou < iouThreshold;
      });
    }
    return result;
  }
}

document.addEventListener('DOMContentLoaded', async function () {
  const options = new xb.Options();
  options.enableUI();
  options.enableCamera();
  options.setAppTitle('YOLOv11 Detector');
  
  options.deviceCamera = new xb.DeviceCameraOptions({
    enabled: true,
    videoConstraints: {
      width: { ideal: 1280 },
      height: { ideal: 720 },
      facingMode: 'environment', // 背面カメラを要求
    },
  });

  // 起動時から仮想画面が見えるようにシミュレーターモードをPOSEに設定
  options.simulator.defaultMode = xb.SimulatorMode.POSE;
  
  xb.add(new YOLOv11App());
  await xb.init(options);
});
    </script>
  </body>
</html>
